<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JDA Trade Monitor — Connection Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2.1.0">
  <style>
    :root {
      --bg-primary: #0B0E11;
      --bg-surface: #1E2026;
      --bg-card-hover: #252930;
      --border-color: #2B3139;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      margin-top: 8px;
    }

    .conn-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .conn-card:hover {
      border-color: #3C4554;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .conn-card.status-ok    { border-left: 3px solid #0ECB81; }
    .conn-card.status-error { border-left: 3px solid #F6465D; }
    .conn-card.status-warning     { border-left: 3px solid #F0B90B; }
    .conn-card.status-unconfigured { border-left: 3px solid #848E9C; }

    .conn-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .conn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .conn-icon.ok            { background: rgba(14,203,129,0.12); }
    .conn-icon.error         { background: rgba(246,70,93,0.12); }
    .conn-icon.warning       { background: rgba(240,185,11,0.12); }
    .conn-icon.unconfigured  { background: rgba(132,142,156,0.12); }

    .conn-icon svg { width: 20px; height: 20px; }
    .conn-icon.ok svg         { color: #0ECB81; stroke: #0ECB81; }
    .conn-icon.error svg      { color: #F6465D; stroke: #F6465D; }
    .conn-icon.warning svg    { color: #F0B90B; stroke: #F0B90B; }
    .conn-icon.unconfigured svg { color: #848E9C; stroke: #848E9C; }

    .conn-name {
      font-size: 14px;
      font-weight: 600;
      color: #EAECEF;
    }

    .conn-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .badge-ok            { background: rgba(14,203,129,0.15); color: #0ECB81; }
    .badge-error         { background: rgba(246,70,93,0.15);  color: #F6465D; }
    .badge-warning       { background: rgba(240,185,11,0.15); color: #F0B90B; }
    .badge-unconfigured  { background: rgba(132,142,156,0.12); color: #848E9C; }

    .conn-detail {
      font-size: 12px;
      color: #848E9C;
      line-height: 1.5;
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border: 1px solid var(--border-color);
      font-family: var(--font-mono);
    }

    .conn-latency {
      font-size: 11px;
      color: #5A6478;
      text-align: right;
    }

    .summary-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      margin-bottom: 4px;
    }
    .summary-bar .sum-label { color: #848E9C; font-size: 13px; }
    .summary-bar .sum-ok    { color: #0ECB81; font-weight: 600; }
    .summary-bar .sum-err   { color: #F6465D; font-weight: 600; }
    .summary-bar .sum-warn  { color: #F0B90B; font-weight: 600; }
    .summary-bar .sum-ts    { margin-left: auto; color: #5A6478; font-size: 12px; font-family: var(--font-mono); }

    .skeleton {
      background: linear-gradient(90deg, #1E2026 25%, #252930 50%, #1E2026 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 16px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

    </div>
    <ul class="sidebar-nav">
      <li class="sidebar-item">

          <span>ETF Monitor</span>
        </a>
      </li>
      <li class="sidebar-item">
        <a href="heatmap.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 22 22 22"></polygon><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
          <span>Liquidation Heatmap</span>

      </li>
      <li class="sidebar-item">
        <a href="raw-data.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          <span>Raw Data</span>
        </a>
      </li>
      <li class="sidebar-item active">
        <a href="status.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>

        </a>

    <div class="sidebar-footer">
      <a href="/auth/logout" class="sidebar-logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span>Logout</span>

    </div>

  <div class="top-bar">
    <div class="top-bar-title">Connection Status<span>All required services</span></div>
    <div class="top-bar-controls">
      <div id="connection-status" class="status-indicator normal">
        <span class="status-dot"></span>
        <span class="status-text">Checking...</span>
      </div>
      <button id="btn-refresh" class="btn btn-primary">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
        </svg>
        Check Now
      </button>
    </div>
  </div>

  <div class="app-container">
    <div id="summary-bar" class="summary-bar" style="display:none;">
      <span class="sum-label">Status:</span>
      <span id="sum-ok" class="sum-ok"></span>
      <span id="sum-err" class="sum-err"></span>
      <span id="sum-warn" class="sum-warn"></span>
      <span id="sum-ts" class="sum-ts"></span>
    </div>

    <div id="status-grid" class="status-grid">
      <!-- skeleton placeholders -->
      <div class="conn-card" style="height:120px;"><div class="skeleton" style="width:60%;margin-top:8px"></div><div class="skeleton" style="width:40%;margin-top:12px"></div></div>
      <div class="conn-card" style="height:120px;"><div class="skeleton" style="width:60%;margin-top:8px"></div><div class="skeleton" style="width:40%;margin-top:12px"></div></div>
      <div class="conn-card" style="height:120px;"><div class="skeleton" style="width:60%;margin-top:8px"></div><div class="skeleton" style="width:40%;margin-top:12px"></div></div>
      <div class="conn-card" style="height:120px;"><div class="skeleton" style="width:60%;margin-top:8px"></div><div class="skeleton" style="width:40%;margin-top:12px"></div></div>
      <div class="conn-card" style="height:120px;"><div class="skeleton" style="width:60%;margin-top:8px"></div><div class="skeleton" style="width:40%;margin-top:12px"></div></div>
      <div class="conn-card" style="height:120px;"><div class="skeleton" style="width:60%;margin-top:8px"></div><div class="skeleton" style="width:40%;margin-top:12px"></div></div>
    </div>
  </div>

  <script src="status.js?v=2.1.0"></script>
</body>
</html>
